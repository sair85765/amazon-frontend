<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <!-- Dark Mode Toggle -->
            <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
                <button class="dark-mode-toggle" id="darkModeToggle" title="Toggle Dark Mode">
                    🌙
                </button>
            </div>

            <h1>🛒 Amazon</h1>
            
            <!-- Tab Switcher -->
            <div class="tab-switcher">
                <button class="tab-btn active" id="loginTab">Sign In</button>
                <button class="tab-btn" id="signupTab">Create Account</button>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <div id="loginFormContainer">
                <h2>Sign In</h2>
                <form id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit">Sign In</button>
                </form>
                <p id="loginError" class="error-message"></p>
            </div>

            <!-- ===== SIGN UP FORM ===== -->
            <div id="signupFormContainer" style="display: none;">
                <h2>Create Account</h2>
                <form id="signupForm">
                    <input type="text" id="signupName" placeholder="Full Name" required>
                    <input type="email" id="signupEmail" placeholder="Email" required>
                    <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" required>
                    <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>
                    <button type="submit">Create Account</button>
                </form>
                <p id="signupError" class="error-message"></p>
                <p id="signupSuccess" class="success-message"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
